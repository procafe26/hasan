<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Intercom DESIGN.md tokens */
    :root {
      --ink:           #111111;
      --ink-muted:     #626260;
      --ink-subtle:    #7b7b78;
      --ink-tertiary:  #9c9fa5;
      --canvas:        #f5f1ec;
      --surface-1:     #ffffff;
      --surface-2:     #ebe7e1;
      --hairline:      #d3cec6;
      --hairline-soft: #ebe7e1;
      --fin-orange:    #ff5600;
      --error:         #c41c1c;
      --success:       #0bdf50;

      --r-xs:   4px;
      --r-sm:   6px;
      --r-md:   8px;
      --r-lg:   12px;
      --r-xl:   16px;
      --r-pill: 9999px;

      --font: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--canvas);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── APP SHELL ── */
    .app {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      height: 100%;
      background: var(--canvas);
      border-right: 1px solid var(--hairline);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--hairline-soft);
    }

    .wordmark {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.2px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wordmark-dot {
      width: 8px;
      height: 8px;
      background: var(--fin-orange);
      border-radius: var(--r-pill);
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--ink-tertiary); }
    .search-input:focus { border-color: var(--ink-muted); }

    .filter-tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--hairline-soft);
    }

    .filter-tab {
      background: transparent;
      border: none;
      border-radius: var(--r-pill);
      padding: 5px 12px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .filter-tab.active { background: var(--surface-1); color: var(--ink); }
    .filter-tab:hover:not(.active) { color: var(--ink); }

    .conv-list {
      flex: 1;
      overflow-y: auto;
    }

    .conv-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--hairline-soft);
      transition: background 0.1s;
    }
    .conv-row:hover { background: var(--surface-2); }
    .conv-row.active { background: var(--surface-1); }

    .conv-avatar {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: var(--r-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
    }

    .conv-body { flex: 1; min-width: 0; }

    .conv-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .conv-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-time {
      font-size: 11px;
      color: var(--ink-tertiary);
      white-space: nowrap;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .conv-snippet {
      font-size: 13px;
      color: var(--ink-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--r-xs);
      font-size: 11px;
      font-weight: 500;
    }
    .s-open     { background: #fff3ee; color: var(--fin-orange); }
    .s-pending  { background: #fef9ec; color: #b45309; }
    .s-resolved { background: #f0fdf4; color: #166534; }

    /* ── MAIN CHAT ── */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .chat-header {
      padding: 13px 20px;
      background: var(--surface-1);
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-header-left { display: flex; align-items: center; gap: 12px; }

    .chat-customer-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.2px;
    }

    .status-select {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 4px 10px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      cursor: pointer;
      outline: none;
    }

    .chat-header-right { display: flex; align-items: center; gap: 8px; }

    .assignee-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      padding: 3px 10px 3px 4px;
    }

    .assignee-avatar {
      width: 22px;
      height: 22px;
      border-radius: var(--r-pill);
      background: var(--ink);
      color: var(--surface-1);
      font-size: 10px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .assignee-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      background: var(--surface-1);
      color: var(--ink-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .btn-icon:hover { color: var(--ink); background: var(--canvas); }

    /* Message thread */
    .message-thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--canvas);
    }

    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 8px;
    }
    .date-divider-line { flex: 1; height: 1px; background: var(--hairline-soft); }
    .date-divider-label { font-size: 11px; color: var(--ink-tertiary); font-weight: 500; white-space: nowrap; }

    .msg-group { display: flex; gap: 10px; }
    .msg-group.agent { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: var(--r-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-col { display: flex; flex-direction: column; gap: 3px; max-width: 65%; }
    .msg-group.agent .msg-col { align-items: flex-end; }

    .msg-sender-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-muted);
      padding: 0 2px;
    }
    .fin-sender { color: var(--fin-orange); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--r-lg);
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      border-bottom-left-radius: var(--r-xs);
    }

    .msg-group.agent .msg-bubble {
      background: var(--ink);
      color: var(--surface-1);
      border-color: var(--ink);
      border-bottom-left-radius: var(--r-lg);
      border-bottom-right-radius: var(--r-xs);
    }

    .msg-bubble.fin-bubble {
      border-left: 2px solid var(--fin-orange);
    }

    .msg-time {
      font-size: 11px;
      color: var(--ink-tertiary);
      padding: 0 2px;
    }

    /* Composer */
    .composer {
      padding: 12px 20px 16px;
      background: var(--surface-1);
      border-top: 1px solid var(--hairline);
      flex-shrink: 0;
    }

    .composer-toolbar {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
    }

    .toolbar-btn {
      padding: 4px 10px;
      border: none;
      background: transparent;
      border-radius: var(--r-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .toolbar-btn:hover { background: var(--canvas); color: var(--ink); }
    .toolbar-btn.active { background: var(--canvas); color: var(--ink); }

    .composer-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .composer-textarea {
      flex: 1;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--ink);
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .composer-textarea::placeholder { color: var(--ink-tertiary); }
    .composer-textarea:focus { border-color: var(--ink-muted); }

    .btn-send {
      background: var(--fin-orange);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      padding: 0 20px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      height: 44px;
      transition: opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-send:hover { opacity: 0.87; }
    .btn-send:active { opacity: 0.73; }

    /* ── CUSTOMER PANEL ── */
    .customer-panel {
      width: 300px;
      min-width: 300px;
      height: 100%;
      background: var(--canvas);
      border-left: 1px solid var(--hairline);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 6px;
      padding: 24px 16px 16px;
      border-bottom: 1px solid var(--hairline-soft);
    }

    .panel-avatar {
      width: 52px;
      height: 52px;
      border-radius: var(--r-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 4px;
    }

    .panel-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.2px;
    }

    .panel-email { font-size: 13px; color: var(--ink-muted); }

    .plan-badge {
      background: var(--surface-2);
      color: var(--ink-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: var(--r-pill);
      margin-top: 2px;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--hairline-soft);
    }

    .btn-resolve {
      flex: 1;
      background: var(--ink);
      color: var(--surface-1);
      border: none;
      border-radius: var(--r-md);
      padding: 9px 16px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-resolve:hover { opacity: 0.82; }

    .btn-snooze {
      flex: 1;
      background: var(--surface-1);
      color: var(--ink);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 9px 16px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-snooze:hover { background: var(--canvas); }

    .panel-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--hairline-soft);
    }

    .panel-section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-subtle);
      margin-bottom: 10px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 4px 0;
      gap: 8px;
    }

    .meta-label { font-size: 13px; color: var(--ink-subtle); white-space: nowrap; }
    .meta-value { font-size: 13px; color: var(--ink); font-weight: 500; text-align: right; }

    .priority-high   { color: var(--error); }
    .priority-medium { color: #b45309; }
    .priority-low    { color: #166534; }

    .tag-pill {
      display: inline-flex;
      background: var(--surface-2);
      color: var(--ink-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--r-xs);
      margin: 2px 2px 0 0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 99px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .customer-panel { display: none; }
    }
    @media (max-width: 768px) {
      .sidebar { width: 220px; min-width: 220px; }
    }
    @media (max-width: 480px) {
      .sidebar { width: 50px; min-width: 50px; }
      .sidebar-header, .filter-tabs, .conv-body { display: none; }
      .conv-row { justify-content: center; padding: 10px 7px; border-bottom: 1px solid var(--hairline-soft); }
      .message-thread { padding: 16px 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="wordmark">
        <div class="wordmark-dot"></div>
        Customer Support
      </div>
      <input class="search-input" type="text" placeholder="Search conversations…" id="searchInput">
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="open">Open</button>
      <button class="filter-tab" data-filter="pending">Pending</button>
      <button class="filter-tab" data-filter="resolved">Resolved</button>
    </div>

    <div class="conv-list" id="convList"></div>
  </aside>

  <!-- ── MAIN CHAT ── -->
  <main class="main-chat">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-customer-name" id="chatName">—</span>
        <select class="status-select" id="statusSelect">
          <option value="open">Open</option>
          <option value="pending">Pending</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>
      <div class="chat-header-right">
        <div class="assignee-chip" id="assigneeChip">
          <div class="assignee-avatar" id="assigneeAvatar"></div>
          <span class="assignee-name" id="assigneeName"></span>
        </div>
        <button class="btn-icon" title="More options">···</button>
      </div>
    </div>

    <div class="message-thread" id="messageThread"></div>

    <div class="composer">
      <div class="composer-toolbar">
        <button class="toolbar-btn active" data-mode="reply">Reply</button>
        <button class="toolbar-btn" data-mode="note">Note</button>
      </div>
      <div class="composer-row">
        <textarea class="composer-textarea" id="composerTextarea" placeholder="Write a reply…" rows="1"></textarea>
        <button class="btn-send" id="sendBtn">Send</button>
      </div>
    </div>
  </main>

  <!-- ── CUSTOMER PANEL ── -->
  <aside class="customer-panel">
    <div class="panel-head">
      <div class="panel-avatar" id="panelAvatar"></div>
      <div class="panel-name"  id="panelName">—</div>
      <div class="panel-email" id="panelEmail">—</div>
      <span class="plan-badge" id="panelPlan">—</span>
    </div>

    <div class="panel-actions">
      <button class="btn-resolve" id="btnResolve">Resolve</button>
      <button class="btn-snooze">Snooze</button>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Conversation</div>
      <div class="meta-row">
        <span class="meta-label">Status</span>
        <span class="meta-value" id="metaStatus">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Priority</span>
        <span class="meta-value" id="metaPriority">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Assignee</span>
        <span class="meta-value" id="metaAssignee">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Created</span>
        <span class="meta-value" id="metaCreated">—</span>
      </div>
      <div class="meta-row" style="align-items:flex-start;padding-top:6px;">
        <span class="meta-label">Tags</span>
        <div id="metaTags"></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Customer</div>
      <div class="meta-row">
        <span class="meta-label">Company</span>
        <span class="meta-value" id="metaCompany">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Location</span>
        <span class="meta-value" id="metaLocation">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Local time</span>
        <span class="meta-value" id="metaLocalTime">—</span>
      </div>
    </div>
  </aside>

</div>
<script>

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeId     = CONVS[0].id;
let activeFilter = 'all';

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function nowTime() {
  return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────
function renderList(filter, search) {
  const list = document.getElementById('convList');
  const q = (search || '').toLowerCase();
  const items = CONVS.filter(c => {
    const matchF = filter === 'all' || c.status === filter;
    const matchS = !q || c.name.toLowerCase().includes(q) || c.snippet.toLowerCase().includes(q);
    return matchF && matchS;
  });

  if (!items.length) {
    list.innerHTML = '<div style="padding:24px 16px;font-size:13px;color:var(--ink-tertiary);text-align:center;">No conversations found</div>';
    return;
  }

  list.innerHTML = items.map(c => `
    <div class="conv-row${c.id === activeId ? ' active' : ''}" data-id="${c.id}">
      <div class="conv-avatar" style="background:${c.color}">${c.initials}</div>
      <div class="conv-body">
        <div class="conv-top">
          <span class="conv-name">${esc(c.name)}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div class="conv-snippet">${esc(c.snippet)}</div>
        <span class="status-badge s-${c.status}">${c.status}</span>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.conv-row').forEach(row => {
    row.addEventListener('click', () => {
      activeId = +row.dataset.id;
      renderAll();
    });
  });
}

// ── RENDER CHAT ───────────────────────────────────────────────────────────────
function renderChat() {
  const c = CONVS.find(x => x.id === activeId);
  if (!c) return;

  document.getElementById('chatName').textContent = c.name;
  document.getElementById('statusSelect').value = c.status;

  const ag = AGENTS[c.assignee];
  const avEl = document.getElementById('assigneeAvatar');
  avEl.textContent  = ag.initials;
  avEl.style.background = ag.color;
  document.getElementById('assigneeName').textContent = ag.name;

  const thread = document.getElementById('messageThread');
  thread.innerHTML = `
    <div class="date-divider">
      <div class="date-divider-line"></div>
      <span class="date-divider-label">${c.created}</span>
      <div class="date-divider-line"></div>
    </div>
    ${c.thread.map(m => renderMsg(m, c)).join('')}
  `;
  thread.scrollTop = thread.scrollHeight;
}

function renderMsg(m, c) {
  if (m.from === 'customer') {
    return `
      <div class="msg-group customer">
        <div class="msg-avatar" style="background:${c.color};color:#fff">${c.initials}</div>
        <div class="msg-col">
          <div class="msg-sender-label">${esc(c.name)}</div>
          <div class="msg-bubble">${esc(m.text)}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>`;
  }
  if (m.from === 'fin') {
    return `
      <div class="msg-group customer">
        <div class="msg-avatar" style="background:var(--fin-orange);color:#fff;font-size:9px;font-weight:600">Fin</div>
        <div class="msg-col">
          <div class="msg-sender-label fin-sender">Fin AI</div>
          <div class="msg-bubble fin-bubble">${esc(m.text)}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>`;
  }
  const ag = AGENTS[m.agentId] || AGENTS.js;
  return `
    <div class="msg-group agent">
      <div class="msg-avatar" style="background:${ag.color};color:#fff">${ag.initials}</div>
      <div class="msg-col">
        <div class="msg-sender-label">${esc(ag.name)}</div>
        <div class="msg-bubble">${esc(m.text)}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>`;
}

// ── RENDER PANEL ──────────────────────────────────────────────────────────────
function renderPanel() {
  const c = CONVS.find(x => x.id === activeId);
  if (!c) return;

  const pa = document.getElementById('panelAvatar');
  pa.textContent = c.initials;
  pa.style.background = c.color;

  document.getElementById('panelName').textContent  = c.name;
  document.getElementById('panelEmail').textContent = c.email;
  document.getElementById('panelPlan').textContent  = c.plan;

  document.getElementById('metaStatus').textContent   = cap(c.status);
  const priEl = document.getElementById('metaPriority');
  priEl.textContent = cap(c.priority);
  priEl.className   = `meta-value priority-${c.priority}`;
  document.getElementById('metaAssignee').textContent = AGENTS[c.assignee].name;
  document.getElementById('metaCreated').textContent  = c.created;
  document.getElementById('metaCompany').textContent  = c.company;
  document.getElementById('metaLocation').textContent = c.location;
  document.getElementById('metaLocalTime').textContent= c.localTime;
  document.getElementById('metaTags').innerHTML = c.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('');
}

function renderAll() {
  renderList(activeFilter, document.getElementById('searchInput').value);
  renderChat();
  renderPanel();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────

// Filter tabs
document.getElementById('filterTabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderList(activeFilter, document.getElementById('searchInput').value);
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  renderList(activeFilter, e.target.value);
});

// Toolbar (Reply / Note)
document.querySelectorAll('.toolbar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('composerTextarea').placeholder =
      btn.dataset.mode === 'note' ? 'Write an internal note…' : 'Write a reply…';
  });
});

// Send
function sendMessage() {
  const ta   = document.getElementById('composerTextarea');
  const text = ta.value.trim();
  if (!text) return;

  const c  = CONVS.find(x => x.id === activeId);
  const ag = AGENTS[c.assignee];

  c.thread.push({ from: 'agent', agentId: c.assignee, text, time: nowTime() });
  c.snippet = text.length > 52 ? text.slice(0, 52) + '…' : text;
  c.time    = 'Just now';

  ta.value = '';
  ta.style.height = '';

  renderAll();
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);

document.getElementById('composerTextarea').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-grow textarea
document.getElementById('composerTextarea').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Status dropdown
document.getElementById('statusSelect').addEventListener('change', e => {
  const c = CONVS.find(x => x.id === activeId);
  if (c) { c.status = e.target.value; renderAll(); }
});

// Resolve button
document.getElementById('btnResolve').addEventListener('click', () => {
  const c = CONVS.find(x => x.id === activeId);
  if (c && c.status !== 'resolved') {
    c.status = 'resolved';
    document.getElementById('statusSelect').value = 'resolved';
    renderAll();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
